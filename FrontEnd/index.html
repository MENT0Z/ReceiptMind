<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Document Intelligence Pipeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1>Document Intelligence Pipeline</h1>
            <p>OCR → KIE → Structured Data → Intelligent Queries</p>
        </header>

        <!-- Upload Card -->
        <section class="card split-layout">
            <div class="upload-left">
    <h2>Upload Documents</h2>

    <label class="upload-box">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <div class="upload-content">
            <span id="uploadText">Click to upload an image</span>
        </div>
    </label>

    <button id="processBtn" disabled>Process Document</button>
</div>

<div class="upload-right" id="imagePreview"></div>

        </section>
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading hidden">
            <div class="shimmer-card"></div>
            <p id="loadingText">Keep calm, your document is processing…</p>
            <div id="loadingStep" class="loading-step"></div>

        </div>

        <!-- Result Section -->
        <section id="resultSection" class="card hidden receipt">

  <!-- HEADER -->
  <div class="receipt-header">
    <input id="vendorName" class="vendor-name" placeholder="Vendor name" />
    <input id="vendorAddress" class="vendor-address" placeholder="Vendor address" />

    <div class="receipt-meta">
      <input id="vendorPhone" placeholder="Phone" />
      <input id="docDate" placeholder="Date" />
      <input id="docTime" placeholder="Time" />
    </div>
  </div>

  <hr />

  <!-- ITEMS -->
  <div class="items-header">
    <span>Item</span>
    <span>Qty</span>
    <span>Price</span>
    <span>Category</span>
  </div>

  <div id="itemsBody"></div>
  <div id="addItemRow">
  <button id="addItemBtn">＋ Add Item</button>
  </div>


  <hr />

  <!-- TOTAL -->
  <div class="total-row">
    <span>Total</span>
    <input id="totalAmount" type="number" step="0.01" />
  </div>

  <button id="saveBtn">Save</button>
</section>


        <!-- Footer -->
        <footer class="footer">
            <span>AI-powered document understanding system</span>
        </footer>

    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="app.js"></script>
</body>

</html>
